name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json

      - name: Initialize skills submodule
        run: git submodule update --init --recursive skills

      - name: Install root dependencies
        run: npm ci

      - name: Install docs dependencies
        run: npm --prefix docs ci

      - name: Build packages
        run: npm run build

      - name: Test
        run: npm test

      - name: Build docs
        run: npm run docs:build
